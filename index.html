<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Pivo za kuma</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { background: #1a252f; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; color: #ecf0f1; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #stage { position: relative; width: 600px; height: 600px; display: flex; justify-content: center; align-items: center; }
        
        #beer-wrapper { position: relative; z-index: 2; filter: drop-shadow(0 0 10px rgba(241, 196, 15, 0.3)); }
        
        #foam { fill: #ffffff; opacity: 0; }
        
        .drop { position: absolute; background: #f1c40f; border-radius: 50%; opacity: 0; z-index: 1; box-shadow: 0 0 5px #f39c12; }
        
        .text-section { font-size: 2.5rem; font-weight: 800; text-align: center; margin-top: 50px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="stage">
        <div id="beer-wrapper">
            <svg width="120" height="180" viewBox="0 0 100 160">
                <defs>
                    <linearGradient id="beerGradient" x1="0" y1="0" x2="0" y2="100%">
                        <stop offset="0%" stop-color="#f1c40f" />
                        <stop offset="100%" stop-color="#d35400" />
                    </linearGradient>
                </defs>
                <rect x="20" y="30" width="60" height="110" rx="5" ry="5" fill="url(#beerGradient)" />
                <rect x="20" y="30" width="60" height="110" rx="5" ry="5" fill="white" fill-opacity="0.1" stroke="white" stroke-width="2"/>
                <path id="foam" d="M 18 30 A 30 10 0 1 0 82 30 A 30 10 0 1 0 18 30" />
            </svg>
        </div>
    </div>
    
    <div class="text-section" id="text"></div>

    <script>
        const stage = document.getElementById('stage');
        const textElement = document.getElementById('text');
        
        // Poruka sa <br> za prelom reda
        const message = "Kume, hoćemo li na pivo?<br>Žedan sam ko pustinja! 🍺";
        let textIndex = 0;

        function typeWriter() {
            // Provera za tag za novi red
            if (message.substring(textIndex, textIndex + 4) === "<br>") {
                textElement.innerHTML += "<br>";
                textIndex += 4;
            }
            
            if (textIndex < message.length) {
                textElement.innerHTML += message.charAt(textIndex);
                textIndex++;
                setTimeout(typeWriter, 100);
            }
        }
        typeWriter();

        const tl = gsap.timeline({ repeat: -1, repeatDelay: 1.5 });

        tl.fromTo("#beer-wrapper", { y: -300 }, { y: 0, duration: 1, ease: "bounce.out" })
          .to("#foam", { opacity: 1, scale: 1.1, transformOrigin: "50% 50%", duration: 0.3 })
          .call(shootDrops, null, "-=0.1");

        function shootDrops() {
            for(let i = 0; i < 15; i++) {
                const drop = document.createElement('div');
                const size = Math.random() * 8 + 4;
                drop.className = 'drop';
                drop.style.width = size + 'px';
                drop.style.height = size + 'px';
                stage.appendChild(drop);
                
                gsap.set(drop, { left: 300, top: 250 });
                
                gsap.to(drop, {
                    x: (Math.random() - 0.5) * 300,
                    y: -Math.random() * 400 - 50,
                    opacity: 1,
                    duration: 1.5 + Math.random(),
                    ease: "power2.out"
                });
                gsap.to(drop, { y: "+=150", opacity: 0, delay: 0.8, duration: 0.8, onComplete: () => drop.remove() });
            }
        }
    </script>
</body>
</html>
