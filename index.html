<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Pivo za kuma - Uvećano</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { background: #2c3e50; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* Povećan stage da sve stane */
        #stage { position: relative; width: 600px; height: 600px; display: flex; justify-content: center; }
        
        /* Uvećana čaša */
        #beer-wrapper { position: absolute; top: -150px; z-index: 2; transform: scale(1.8); }
        
        #foam-inside { opacity: 0; fill: white; }
        
        /* Veće kapi */
        .drop { position: absolute; background: #f1c40f; border-radius: 50%; width: 12px; height: 12px; opacity: 0; z-index: 1; }
        
        /* Uvećan tekst */
        .text-section { font-size: 2.2rem; text-align: center; font-weight: bold; white-space: pre-line; text-shadow: 3px 3px 6px rgba(0,0,0,0.5); padding: 30px; z-index: 3; }
    </style>
</head>
<body>

    <div id="stage">
        <div id="beer-wrapper">
            <svg width="80" height="120" viewBox="0 0 100 150">
                <path d="M 25 20 L 25 140 L 75 140 L 75 20 Z" fill="#f1c40f" stroke="white" stroke-width="2"/>
                <path id="foam-inside" d="M 25 20 L 75 20 L 75 35 Q 50 45 25 35 Z" />
                <path d="M 75 50 Q 95 70 75 90" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="8"/>
            </svg>
        </div>
    </div>
    
    <div class="text-section" id="text"></div>

    <script>
        const stage = document.getElementById('stage');
        const textElement = document.getElementById('text');
        const message = "Kume, \nhoćemo li na pivo?\nŽedan sam ko pustinja! 🍺";

        let textIndex = 0;
        function typeWriter() {
            if (textIndex < message.length) {
                textElement.textContent += message.charAt(textIndex);
                textIndex++;
                setTimeout(typeWriter, 50);
            }
        }
        typeWriter();

        const tl = gsap.timeline({ repeat: -1, repeatDelay: 1 });

        // Animacija spuštanja (malo niže zbog veće veličine)
        tl.to("#beer-wrapper", { y: 400, duration: 0.8, ease: "bounce.out" })
          .to("#foam-inside", { opacity: 1, duration: 0.2 })
          .to("#foam-inside", { y: -5, yoyo: true, repeat: 3, duration: 0.1 })
          .call(shootDrops, null, "-=0.2");

        function shootDrops() {
            for(let i = 0; i < 12; i++) {
                const drop = document.createElement('div');
                drop.className = 'drop';
                stage.appendChild(drop);
                
                // Kapi kreću iz centra gde je čaša
                gsap.set(drop, { left: 300, top: 300 });
                
                gsap.to(drop, {
                    x: (Math.random() - 0.5) * 300,
                    y: -Math.random() * 400 - 100, 
                    opacity: 1,
                    duration: 1.5,
                    ease: "power1.out"
                });
                
                gsap.to(drop, {
                    y: "+=150",
                    delay: 0.8,
                    duration: 0.6,
                    opacity: 0,
                    onComplete: () => drop.remove()
                });
            }
        }
    </script>
</body>
</html>
